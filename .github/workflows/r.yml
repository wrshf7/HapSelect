name: HapSelect CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr, any::xml2
          needs: check

      - name: R CMD Check
        run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--no-vignettes", "--ignore-vignettes"), error_on = "error")
        shell: Rscript {0}

      - name: Generate coverage report
        run: |
          cov <- covr::package_coverage()
          pct <- covr::percent_coverage(cov)
          df <- as.data.frame(cov)
          file_summary <- tapply(df$value, df$filename, mean) * 100
          lines <- c("## HapSelect Coverage", "", sprintf("**Total: %.1f%%**", pct), "", "| File | Coverage |", "| --- | --- |")
          for (f in names(file_summary)) {
            lines <- c(lines, sprintf("| %s | %.1f%% |", basename(f), file_summary[[f]]))
          }
          writeLines(lines, Sys.getenv("GITHUB_STEP_SUMMARY"))
        shell: Rscript {0}
