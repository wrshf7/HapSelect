name: HapSelect CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr, any::xml2
          needs: check

      - name: Generate coverage report
        run: |
          # 1. Run package coverage
          cov <- covr::package_coverage(
            line_exclusions = list("R/plink_LD.R", "R/visualizations.R", "R/haploblock_var_test.R")
          )
          
          # 2. Extract total percentage
          pct <- covr::percent_coverage(cov)
          
          # 3. Convert to dataframe and process
          file_pcts <- as.data.frame(cov)
          file_pcts <- file_pcts[!grepl("\\.cpp$", file_pcts$filename), ]

          # 4. Calculate percentages per file: fraction of lines executed at least once
          file_summary <- aggregate(value ~ filename, data = file_pcts, FUN = function(x) mean(x > 0) * 100)
          names(file_summary)[2] <- "pct"
          
          # 5. Build the GitHub Step Summary Markdown
          lines <- c(
            "## HapSelect Coverage", 
            "", 
            sprintf("**Total: %.1f%%**", pct), 
            "", 
            "| File | Coverage |", 
            "| --- | --- |"
          )
          
          for (i in seq_len(nrow(file_summary))) {
            lines <- c(lines, sprintf("| %s | %.1f%% |", basename(file_summary$filename[i]), file_summary$pct[i]))
          }
          
          writeLines(lines, Sys.getenv("GITHUB_STEP_SUMMARY"))
        shell: Rscript {0}

      - name: Run R CMD check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}