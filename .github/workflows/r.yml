name: HapSelect CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr, any::xml2
          needs: check

      - name: Generate coverage report
        run: |
          # 1. Run package coverage in a clean environment without global parsing options
          cov <- covr::package_coverage(
            line_exclusions = list("R/plink_LD.R")
          )
          
          # 2. Extract total percentage
          pct <- covr::percent_coverage(cov)
          
          # 3. Correctly extract per-file metrics from the package coverage object
          file_pcts <- covr::to_dataframe(cov)
          
          # 4. Group and calculate percentages per file, ignoring .cpp files
          library(stats) # Safe default for aggregate
          file_summary <- aggregate(cbind(value, coverage) ~ filename, data = file_pcts, FUN = sum)
          file_summary$pct <- (file_summary$value / file_summary$coverage) * 100
          file_summary <- file_summary[!grepl("\\.cpp$", file_summary$filename), ]
          
          # 5. Build the GitHub Step Summary Markdown
          lines <- c(
            "## HapSelect Coverage", 
            "", 
            sprintf("**Total: %.1f%%**", pct), 
            "", 
            "| File | Coverage |", 
            "| --- | --- |"
          )
          
          for (i in seq_len(nrow(file_summary))) {
            lines <- c(lines, sprintf("| %s | %.1f%% |", basename(file_summary$filename[i]), file_summary$pct[i]))
          }
          
          writeLines(lines, Sys.getenv("GITHUB_STEP_SUMMARY"))
        shell: Rscript {0}